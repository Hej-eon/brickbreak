<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Neon Breaker</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(circle,#18234d,#050816);font-family:Arial;color:#fff}#g{position:relative;width:900px;height:600px}canvas{background:#030814;border:2px solid #0ff;box-shadow:0 0 20px #0ff}.ui{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:2;font-size:24px}.screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.8);z-index:3}.hidden{display:none}h1{font-size:72px;color:#0ff;text-shadow:0 0 25px #0ff}button{padding:15px 30px;font-size:24px;background:#f0f;border:0;color:#fff;border-radius:10px;box-shadow:0 0 20px #f0f}</style></head><body><div id=g><div class=ui>Score <span id=s>0</span> | Lives <span id=l>3</span></div><canvas id=c width=900 height=600></canvas><div id=m class=screen><h1>NEON BREAKER</h1><button onclick=startGame()>START</button></div><div id=e class='screen hidden'><h1 id=t></h1><button onclick=startGame()>PLAY AGAIN</button></div></div><script>const x=c.getContext('2d');let score,lives,paddle,balls,bricks,pups,parts,mult,left=0,right=0,state='menu';onkeydown=a=>{if(a.key=='ArrowLeft')left=1;if(a.key=='ArrowRight')right=1};onkeyup=a=>{if(a.key=='ArrowLeft')left=0;if(a.key=='ArrowRight')right=0};function startGame(){score=0;lives=3;mult=1;paddle={x:370,y:560,w:160,h:14,s:14};balls=[{x:450,y:520,dx:5,dy:-5,r:8}];bricks=[];pups=[];parts=[];for(let r=0;r<5;r++)for(let i=0;i<8;i++)bricks.push({x:55+i*100,y:70+r*40,w:80,h:20,a:1,c:['#0f8','#0ff','#f0f','#ff0','#f70'][r]});s.textContent=0;l.textContent=3;m.classList.add('hidden');e.classList.add('hidden');state='play'}function boom(X,Y,C){for(let i=0;i<30;i++)parts.push({x:X,y:Y,dx:(Math.random()-.5)*8,dy:(Math.random()-.5)*8,n:2+Math.random()*4,l:40,c:C})}function pow(x,y){if(Math.random()>.25)return;let a=['expand','life','score','multi'];pups.push({x,y,t:a[Math.floor(Math.random()*4)],dy:2})}function apply(t){if(t=='life'){lives++;l.textContent=lives}if(t=='expand'){paddle.w+=70;setTimeout(()=>paddle.w=Math.max(160,paddle.w-70),10000)}if(t=='score'){mult=2;setTimeout(()=>mult=1,10000)}if(t=='multi'&&balls.length<6){let add=[];balls.forEach(b=>{add.push({...b,dx:b.dx+2});add.push({...b,dx:b.dx-2})});balls=balls.concat(add).slice(0,6)}}function end(txt){state='end';t.textContent=txt;e.classList.remove('hidden')}function upd(){if(state!='play')return;if(left)paddle.x=Math.max(0,paddle.x-paddle.s);if(right)paddle.x=Math.min(900-paddle.w,paddle.x+paddle.s);for(let i=balls.length-1;i>=0;i--){let b=balls[i];b.x+=b.dx;b.y+=b.dy;if(b.x<b.r||b.x>900-b.r)b.dx*=-1;if(b.y<b.r)b.dy*=-1;if(b.y+b.r>paddle.y&&b.x>paddle.x&&b.x<paddle.x+paddle.w&&b.dy>0){b.dy=-Math.abs(b.dy);b.dx=((b.x-(paddle.x+paddle.w/2))/(paddle.w/2))*8}if(b.y>600)balls.splice(i,1);for(let k of bricks)if(k.a&&b.x>k.x&&b.x<k.x+k.w&&b.y>k.y&&b.y<k.y+k.h){k.a=0;b.dy*=-1;score+=100*mult;s.textContent=score;boom(k.x+40,k.y+10,k.c);pow(k.x+40,k.y+10)}}if(!balls.length){lives--;l.textContent=lives;if(lives<=0)end('GAME OVER');else balls=[{x:450,y:520,dx:5,dy:-5,r:8}]}if(bricks.every(b=>!b.a))end('YOU WIN');pups=pups.filter(p=>{p.y+=p.dy;if(p.y>paddle.y&&p.x>paddle.x&&p.x<paddle.x+paddle.w){apply(p.t);return 0}return p.y<600});parts=parts.filter(p=>{p.x+=p.dx;p.y+=p.dy;p.l--;return p.l>0})}function draw(){x.clearRect(0,0,900,600);bricks.forEach(b=>{if(!b.a)return;x.fillStyle=b.c;x.shadowColor=b.c;x.shadowBlur=15;x.fillRect(b.x,b.y,b.w,b.h)});x.shadowBlur=0;x.fillStyle='#0ff';x.fillRect(paddle?.x||0,paddle?.y||0,paddle?.w||0,14);balls.forEach(b=>{x.fillStyle='#f0f';x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill()});parts.forEach(p=>{x.globalAlpha=p.l/40;x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.n,0,7);x.fill()});x.globalAlpha=1;pups.forEach(p=>{x.font='20px Arial';x.textAlign='center';const icon={expand:'↔',life:'❤',score:'2x',multi:'✦'}[p.t];const col={expand:'#0ff',life:'#f0f',score:'#ff0',multi:'#f70'}[p.t];x.fillStyle=col;x.shadowColor=col;x.shadowBlur=15;x.fillText(icon,p.x,p.y)});}function loop(){upd();draw();requestAnimationFrame(loop)}loop();</script></body></html>
