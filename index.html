<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Brick Breaker</title>

<style>
:root{
    --cyan:#00ffff;
    --pink:#ff00ff;
    --bg:#050816;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:radial-gradient(circle at top,#151f45,#050816);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    overflow:hidden;
}

#gameContainer{
    position:relative;
    width:100%;
    height:100vh;
}

canvas{
    display:block;
    margin:auto;
    background:#060b1f;
    border:2px solid var(--cyan);
    box-shadow:
    0 0 10px var(--cyan),
    0 0 30px rgba(0,255,255,.5);
}

.ui{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:40px;
    font-size:22px;
    text-shadow:0 0 8px var(--cyan);
}

.screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.8);
}

.hidden{
    display:none;
}

h1{
    font-size:72px;
    color:var(--cyan);
    text-shadow:
    0 0 10px var(--cyan),
    0 0 30px var(--cyan);
    margin-bottom:20px;
}

.subtitle{
    color:#bbb;
    margin-bottom:30px;
}

button{
    padding:14px 28px;
    font-size:20px;
    border:none;
    cursor:pointer;
    background:var(--pink);
    color:white;
    border-radius:8px;
    box-shadow:
    0 0 10px var(--pink),
    0 0 30px var(--pink);
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div id="gameContainer">

    <div class="ui">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div class="screen" id="menuScreen">
        <h1>NEON BREAKER</h1>
        <p class="subtitle">Destroy every brick to win</p>
        <button id="startBtn">START GAME</button>
    </div>

    <div class="screen hidden" id="endScreen">
        <h1 id="endTitle"></h1>
        <p class="subtitle">Play again?</p>
        <button id="restartBtn">PLAY AGAIN</button>
    </div>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");

const menuScreen = document.getElementById("menuScreen");
const endScreen = document.getElementById("endScreen");
const endTitle = document.getElementById("endTitle");

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let gameState = "menu";

let score;
let lives;

let paddle;
let ball;
let bricks;

const BRICK_ROWS = 5;
const BRICK_COLS = 8;

let leftPressed = false;
let rightPressed = false;

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") leftPressed=true;
    if(e.key==="ArrowRight") rightPressed=true;
});

document.addEventListener("keyup", e=>{
    if(e.key==="ArrowLeft") leftPressed=false;
    if(e.key==="ArrowRight") rightPressed=false;
});

startBtn.addEventListener("click", startGame);
restartBtn.addEventListener("click", startGame);

function startGame(){

    score = 0;
    lives = 3;

    scoreEl.textContent = score;
    livesEl.textContent = lives;

    paddle = {
        width:140,
        height:14,
        x:(canvas.width-140)/2,
        y:560,
        speed:9
    };

    ball = {
        radius:8,
        x:canvas.width/2,
        y:530,
        dx:4,
        dy:-4
    };

    bricks = [];

    for(let r=0;r<BRICK_ROWS;r++){

        for(let c=0;c<BRICK_COLS;c++){

            bricks.push({
                x:55 + c*100,
                y:70 + r*45,
                width:80,
                height:20,
                alive:true
            });

        }
    }

    menuScreen.classList.add("hidden");
    endScreen.classList.add("hidden");

    gameState="playing";
}

function drawPaddle(){

    ctx.fillStyle="#00ffff";
    ctx.shadowColor="#00ffff";
    ctx.shadowBlur=15;

    ctx.fillRect(
        paddle.x,
        paddle.y,
        paddle.width,
        paddle.height
    );

    ctx.shadowBlur=0;
}

function drawBall(){

    ctx.beginPath();

    ctx.arc(
        ball.x,
        ball.y,
        ball.radius,
        0,
        Math.PI*2
    );

    ctx.fillStyle="#ff00ff";
    ctx.shadowColor="#ff00ff";
    ctx.shadowBlur=20;
    ctx.fill();

    ctx.closePath();

    ctx.shadowBlur=0;
}

function drawBricks(){

    bricks.forEach(brick=>{

        if(!brick.alive) return;

        ctx.fillStyle="#00ff88";
        ctx.shadowColor="#00ff88";
        ctx.shadowBlur=15;

        ctx.fillRect(
            brick.x,
            brick.y,
            brick.width,
            brick.height
        );

        ctx.shadowBlur=0;
    });
}

function updatePaddle(){

    if(leftPressed && paddle.x > 0){
        paddle.x -= paddle.speed;
    }

    if(rightPressed &&
       paddle.x + paddle.width < canvas.width){
        paddle.x += paddle.speed;
    }
}

function resetBall(){

    ball.x = canvas.width/2;
    ball.y = 530;

    ball.dx = 4;
    ball.dy = -4;
}

function updateBall(){

    ball.x += ball.dx;
    ball.y += ball.dy;

    if(ball.x < ball.radius ||
       ball.x > canvas.width-ball.radius){
        ball.dx *= -1;
    }

    if(ball.y < ball.radius){
        ball.dy *= -1;
    }

    if(
        ball.y + ball.radius >= paddle.y &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.width &&
        ball.dy > 0
    ){
        ball.dy = -ball.dy;

        let hitPoint =
        (ball.x - (paddle.x+paddle.width/2))
        /(paddle.width/2);

        ball.dx = hitPoint * 6;
    }

    if(ball.y > canvas.height){

        lives--;

        livesEl.textContent=lives;

        if(lives <= 0){
            showEndScreen("GAME OVER");
            return;
        }

        resetBall();
    }
}

function brickCollision(){

    let remaining = 0;

    bricks.forEach(brick=>{

        if(!brick.alive) return;

        remaining++;

        if(
            ball.x > brick.x &&
            ball.x < brick.x + brick.width &&
            ball.y > brick.y &&
            ball.y < brick.y + brick.height
        ){
            brick.alive=false;

            ball.dy *= -1;

            score += 100;
            scoreEl.textContent=score;
        }

    });

    const aliveBricks =
        bricks.filter(b=>b.alive).length;

    if(aliveBricks===0){
        showEndScreen("YOU WIN");
    }
}

function showEndScreen(text){

    gameState="ended";

    endTitle.textContent=text;
    endScreen.classList.remove("hidden");
}

function render(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(gameState==="playing"){

        updatePaddle();
        updateBall();
        brickCollision();

        drawBricks();
        drawPaddle();
        drawBall();
    }

    requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
